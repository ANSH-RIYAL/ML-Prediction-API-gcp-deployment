name: Deploy ML Prediction API to Cloud Run

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and Push with Cloud Build
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/ml-prediction-api .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ml-prediction-api \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/ml-prediction-api \
            --region ${{ secrets.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --max-instances=1 \
            --min-instances=0 \
            --concurrency=10 \
            --memory=2Gi \
            --cpu=2 \
            --timeout=120s